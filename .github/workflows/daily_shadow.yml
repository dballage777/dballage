name: Daily Shadow Paper Test

# Runs the forward paper horse-race once a day on GitHub's always-on infra
# (free, real yfinance data) and commits the growing ledger + report back to the
# repo so the 90-180 day test accumulates with zero babysitting.
#
# Trigger it by hand any time from the Actions tab ("Run workflow").
on:
  schedule:
    - cron: "30 22 * * 1-5"      # ~after US close (22:30 UTC, weekdays)
  workflow_dispatch: {}

permissions:
  contents: write                 # allow committing the ledger back

concurrency:
  group: daily-shadow
  cancel-in-progress: false

jobs:
  shadow:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install core deps
        run: |
          python -m pip install --upgrade pip
          pip install numpy pandas scipy scikit-learn pyarrow yfinance fpdf2
      - name: Run shadow horse-race (5 variants, real data)
        env:
          # variant 5 (full_system_max) pulls SEC fundamentals; supply a descriptive
          # User-Agent for SEC EDGAR (override via the SEC_USER_AGENT secret).
          SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT || 'Dballage dballage@nafcs.org' }}
        run: |
          mkdir -p paper/reports
          python -m experiments.run_all_shadow --log paper/shadow_ledger.jsonl
          python -m experiments.daily_report --out paper/reports || true
          python -m experiments.standings --log paper/shadow_ledger.jsonl --out paper/reports || true
          python -m experiments.export_reports --log paper/shadow_ledger.jsonl --out paper/reports || true
      - name: Commit ledger + reports (md + csv + pdf)
        run: |
          git config user.name  "shadow-bot"
          git config user.email "actions@github.com"
          git add -f paper/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "paper: daily shadow run $(date -u +%Y-%m-%d) [skip ci]"
            git push
          fi
      # Optional: email the CSV + PDF. Only runs if you add the MAIL_* secrets
      # (Settings -> Secrets and variables -> Actions). See docs/EMAIL_REPORTS.md.
      - name: Email reports
        if: ${{ env.MAIL_PASSWORD != '' }}
        env:
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_SERVER || 'smtp.gmail.com' }}
          server_port: ${{ secrets.MAIL_PORT || '465' }}
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "Shadow paper report — ${{ github.run_id }}"
          to: ${{ secrets.MAIL_TO || 'dballage@nafcs.org' }}
          from: V12 Shadow Bot
          body: |
            Daily shadow paper-trading report attached (CSV scoreboard + PDF summary).
            Full detail: https://github.com/dballage777/dballage/tree/main/paper/reports
          attachments: paper/reports/standings.csv,paper/reports/shadow_report.pdf
