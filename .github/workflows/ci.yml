name: V12 CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install core deps
        run: |
          python -m pip install --upgrade pip
          pip install numpy pandas scikit-learn scipy pyarrow xgboost lightgbm pytest
      - name: Leakage & feature tests
        run: python -m pytest tests/ -q
      - name: Pipeline smoke test (synthetic fallback)
        run: python -m experiments.run_experiment --quick --name ci_smoke
      - name: Framework self-validation (recovery + no-hallucinate + leakage)
        run: python -m experiments.validate_framework
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v12-results
          path: results/
          if-no-files-found: ignore
